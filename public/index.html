<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoWork – Find Your Workspace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#384795', dark: '#2d3a7a', light: '#eef0fa', light2: '#d4d9f0' }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton { background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner { display:inline-block; width:15px; height:15px; border:2px solid rgba(255,255,255,0.3); border-top-color:currentColor; border-radius:50%; animation:spin .6s linear infinite; flex-shrink:0; }
  </style>
</head>
<body class="bg-slate-50 text-gray-900 min-h-screen">

<nav class="bg-primary sticky top-0 z-50 shadow-md">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 h-[60px] flex items-center gap-4">
    <a href="index.html" class="text-white font-bold text-lg shrink-0 no-underline hover:opacity-90">CoWork</a>
    <div class="hidden md:flex items-center gap-0.5 flex-1">
      <a href="index.html" class="bg-white/15 text-white text-sm font-medium px-3 py-1.5 rounded no-underline">Browse</a>
      <a href="bookings.html" class="text-white/70 hover:text-white hover:bg-white/10 text-sm font-medium px-3 py-1.5 rounded no-underline transition-colors">My Bookings</a>
      <a href="recommend.html" class="text-white/70 hover:text-white hover:bg-white/10 text-sm font-medium px-3 py-1.5 rounded no-underline transition-colors">AI Suggest</a>
    </div>
    <div class="hidden md:flex items-center gap-2 ml-auto shrink-0" id="navAuth"></div>
    <button class="md:hidden ml-auto flex flex-col justify-center gap-[5px] p-1.5 rounded hover:bg-white/10" id="menuToggle" aria-label="Open menu">
      <span class="block w-[22px] h-0.5 bg-white rounded"></span>
      <span class="block w-[22px] h-0.5 bg-white rounded"></span>
      <span class="block w-[22px] h-0.5 bg-white rounded"></span>
    </button>
  </div>
  <!-- Mobile menu: md:!hidden ensures it NEVER shows on desktop even if JS toggled it -->
  <div class="hidden md:!hidden" id="mobileMenu">
    <div class="bg-primary-dark flex flex-col gap-1 px-4 pt-2 pb-4">
      <a href="index.html" class="text-white/85 hover:bg-white/10 hover:text-white px-3 py-2.5 rounded text-sm font-medium no-underline transition-colors">Browse</a>
      <a href="bookings.html" class="text-white/85 hover:bg-white/10 hover:text-white px-3 py-2.5 rounded text-sm font-medium no-underline transition-colors">My Bookings</a>
      <a href="recommend.html" class="text-white/85 hover:bg-white/10 hover:text-white px-3 py-2.5 rounded text-sm font-medium no-underline transition-colors">✨ AI Suggest</a>
      <div class="flex flex-wrap gap-2 pt-2 px-3" id="mobileAuth"></div>
    </div>
  </div>
</nav>

<section class="bg-gradient-to-br from-primary to-primary-dark py-14 px-4 text-center">
  <div class="max-w-lg mx-auto">
    <h1 class="text-3xl sm:text-4xl font-extrabold text-white tracking-tight leading-tight">Find Your Perfect Workspace</h1>
    <p class="text-white/70 mt-3 text-base">Browse and book co-working spaces near you</p>
    <div class="mt-7 max-w-md mx-auto">
      <input type="text" id="searchInput" class="w-full px-4 py-3 rounded-lg border-transparent bg-white/95 shadow-md text-sm placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-white/30" placeholder="Search by name or address..." autocomplete="off" />
    </div>
  </div>
</section>

<main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
  <div id="spacesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 flex flex-col gap-3 min-h-[180px]">
      <div class="skeleton h-[18px] w-3/5"></div>
      <div class="skeleton h-3 w-[90%]"></div>
      <div class="skeleton h-3 w-[70%]"></div>
      <div class="skeleton h-8 w-full mt-auto"></div>
    </div>
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 flex flex-col gap-3 min-h-[180px]">
      <div class="skeleton h-[18px] w-[55%]"></div>
      <div class="skeleton h-3 w-[85%]"></div>
      <div class="skeleton h-3 w-[65%]"></div>
      <div class="skeleton h-8 w-full mt-auto"></div>
    </div>
    <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 flex flex-col gap-3 min-h-[180px]">
      <div class="skeleton h-[18px] w-[70%]"></div>
      <div class="skeleton h-3 w-4/5"></div>
      <div class="skeleton h-3 w-[60%]"></div>
      <div class="skeleton h-8 w-full mt-auto"></div>
    </div>
  </div>
</main>

<!-- LOGIN MODAL -->
<div class="fixed inset-0 bg-gray-900/50 z-[200] p-5 hidden items-center justify-center" id="loginModal">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-[420px] p-7 flex flex-col gap-5" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
    <div class="flex items-center justify-between">
      <h2 class="text-[1.1rem] font-bold text-gray-900" id="loginModalTitle">Sign In</h2>
      <button class="text-gray-400 hover:bg-gray-100 p-1 rounded text-xl leading-none transition-colors" id="modalCloseBtn" aria-label="Close">&times;</button>
    </div>
    <div id="loginError"></div>
    <form id="loginForm" class="flex flex-col gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-[0.82rem] font-semibold text-gray-900" for="loginEmail">Email</label>
        <input type="email" id="loginEmail" class="w-full px-3.5 py-2.5 border border-gray-200 rounded text-sm text-gray-900 bg-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 placeholder:text-gray-400" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-[0.82rem] font-semibold text-gray-900" for="loginPassword">Password</label>
        <input type="password" id="loginPassword" class="w-full px-3.5 py-2.5 border border-gray-200 rounded text-sm text-gray-900 bg-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 placeholder:text-gray-400" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded text-base transition-colors disabled:opacity-45 disabled:cursor-not-allowed flex items-center justify-center gap-1.5" id="loginBtn">Sign In</button>
    </form>
    <p class="text-center text-sm text-gray-500">Don't have an account? <a href="register.html" class="text-primary hover:underline">Create one</a></p>
  </div>
</div>

<script>
  const API = '/api/v1';

  const api = (path, opts = {}) => fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      ...(localStorage.getItem('token') ? { Authorization: 'Bearer ' + localStorage.getItem('token') } : {})
    },
    ...opts
  });

  function isLoggedIn() { return !!localStorage.getItem('token'); }

  function getUserName() {
    try {
      const token = localStorage.getItem('token');
      if (!token) return null;
      const payload = JSON.parse(atob(token.split('.')[1]));
      return payload.name || payload.email || 'User';
    } catch { return 'User'; }
  }

  let pendingSpaceId = null;

  const menuToggle = document.getElementById('menuToggle');
  const mobileMenu = document.getElementById('mobileMenu');
  menuToggle.addEventListener('click', () => {
    mobileMenu.classList.toggle('hidden');
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('nav')) {
      mobileMenu.classList.add('hidden');
    }
  });

  function renderNav() {
    const navAuth = document.getElementById('navAuth');
    const mobileAuth = document.getElementById('mobileAuth');
    if (isLoggedIn()) {
      const ghostBtn = 'text-white/75 border border-white/30 hover:bg-white/10 hover:text-white font-semibold px-3 py-1.5 rounded text-sm transition-colors cursor-pointer bg-transparent';
      navAuth.innerHTML = `
        <span class="text-sm text-white/70 font-medium">Hi, ${getUserName()}</span>
        <button class="${ghostBtn}" id="logoutBtn">Sign Out</button>
      `;
      mobileAuth.innerHTML = `
        <span class="text-white/70 text-sm self-center">Hi, ${getUserName()}</span>
        <button class="${ghostBtn}" id="mobileLogoutBtn">Sign Out</button>
      `;
      document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('token'); window.location.reload(); });
      document.getElementById('mobileLogoutBtn').addEventListener('click', () => { localStorage.removeItem('token'); window.location.reload(); });
    } else {
      const ghostBtn = 'text-white/75 border border-white/30 hover:bg-white/10 hover:text-white font-semibold px-3 py-1.5 rounded text-sm transition-colors';
      navAuth.innerHTML = `
        <a href="register.html" class="${ghostBtn} no-underline">Register</a>
        <button class="bg-white text-primary font-semibold px-3 py-1.5 rounded text-sm hover:bg-gray-100 transition-colors" id="navLoginBtn">Sign In</button>
      `;
      mobileAuth.innerHTML = `
        <a href="register.html" class="${ghostBtn} no-underline">Register</a>
        <button class="bg-white text-primary font-semibold px-3 py-1.5 rounded text-sm hover:bg-gray-100 transition-colors" id="mobileLoginBtn">Sign In</button>
      `;
      document.getElementById('navLoginBtn').addEventListener('click', () => { pendingSpaceId = null; openModal(); });
      document.getElementById('mobileLoginBtn').addEventListener('click', () => { pendingSpaceId = null; mobileMenu.classList.add('hidden'); openModal(); });
    }
  }

  const loginModal = document.getElementById('loginModal');

  function openModal() {
    loginModal.classList.remove('hidden');
    loginModal.classList.add('flex');
    document.getElementById('loginEmail').focus();
  }
  function closeModal() {
    loginModal.classList.add('hidden');
    loginModal.classList.remove('flex');
    document.getElementById('loginError').innerHTML = '';
    document.getElementById('loginForm').reset();
  }

  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
  loginModal.addEventListener('click', (e) => { if (e.target === loginModal) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    errEl.innerHTML = '';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    try {
      const res = await api('/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value.trim(),
          password: document.getElementById('loginPassword').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login failed');
      localStorage.setItem('token', data.token);
      closeModal();
      renderNav();
      if (pendingSpaceId) window.location.href = `space.html?id=${pendingSpaceId}`;
    } catch (err) {
      errEl.innerHTML = `<div class="bg-red-50 text-red-600 border border-red-200 px-4 py-3 rounded text-sm font-medium">${err.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });

  let allSpaces = [];

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderSpaces(spaces) {
    const grid = document.getElementById('spacesGrid');
    if (spaces.length === 0) {
      grid.innerHTML = `
        <div class="col-span-full text-center py-16 text-gray-500">
          <div class="font-semibold text-gray-900 mb-1.5">No spaces found</div>
          <div class="text-sm">Try a different search term.</div>
        </div>
      `;
      return;
    }
    grid.innerHTML = spaces.map(s => `
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all p-5 flex flex-col gap-3">
        <div class="font-bold text-gray-900">${escHtml(s.name)}</div>
        <div class="flex flex-col gap-1.5">
          <div class="flex gap-2 text-sm text-gray-500">
            <span class="uppercase text-[11px] font-bold tracking-wide text-gray-400 shrink-0 w-[52px] pt-px">Address</span>
            <span class="break-words min-w-0">${escHtml(s.address)}</span>
          </div>
          <div class="flex gap-2 text-sm text-gray-500">
            <span class="uppercase text-[11px] font-bold tracking-wide text-gray-400 shrink-0 w-[52px] pt-px">Tel</span>
            <span>${escHtml(s.tel || '—')}</span>
          </div>
        </div>
        <div>
          <span class="inline-flex items-center bg-primary-light text-primary text-xs font-semibold px-2.5 py-1 rounded-full">${escHtml(s.opentime || '?')} – ${escHtml(s.closetime || '?')}</span>
        </div>
        <div class="mt-auto pt-3.5 border-t border-gray-100">
          <button class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-2 rounded text-sm transition-colors" onclick="handleBookNow('${escHtml(s._id)}')">Book Now</button>
        </div>
      </div>
    `).join('');
  }

  function handleBookNow(spaceId) {
    if (!isLoggedIn()) { pendingSpaceId = spaceId; openModal(); }
    else window.location.href = `space.html?id=${spaceId}`;
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    if (!q) { renderSpaces(allSpaces); return; }
    renderSpaces(allSpaces.filter(s =>
      s.name.toLowerCase().includes(q) || (s.address || '').toLowerCase().includes(q)
    ));
  });

  async function loadSpaces() {
    try {
      const res = await api('/coworkingSpaces');
      const data = await res.json();
      allSpaces = Array.isArray(data) ? data : (data.data || []);
      renderSpaces(allSpaces);
    } catch (err) {
      document.getElementById('spacesGrid').innerHTML = `
        <div class="col-span-full bg-red-50 text-red-600 border border-red-200 px-4 py-3 rounded text-sm font-medium">Failed to load spaces. Make sure the server is running.</div>
      `;
    }
  }

  renderNav();
  loadSpaces();
</script>
</body>
</html>
