<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Suggest – CoWork</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#384795', dark: '#2d3a7a', light: '#eef0fa', light2: '#d4d9f0' }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner { display:inline-block; width:15px; height:15px; border:2px solid rgba(255,255,255,0.3); border-top-color:currentColor; border-radius:50%; animation:spin .6s linear infinite; flex-shrink:0; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }
    .thinking-dot { width:8px; height:8px; border-radius:50%; background:#384795; animation:bounce 1.2s infinite ease-in-out; }
    .thinking-dot:nth-child(2){animation-delay:.2s}
    .thinking-dot:nth-child(3){animation-delay:.4s}
  </style>
</head>
<body class="bg-slate-50 text-gray-900 min-h-screen">

<nav class="bg-primary sticky top-0 z-50 shadow-md">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 h-[60px] flex items-center gap-4">
    <a href="index.html" class="text-white font-bold text-lg shrink-0 no-underline hover:opacity-90">CoWork</a>
    <div class="hidden md:flex items-center gap-0.5 flex-1">
      <a href="index.html" class="text-white/70 hover:text-white hover:bg-white/10 text-sm font-medium px-3 py-1.5 rounded no-underline transition-colors">Browse</a>
      <a href="bookings.html" class="text-white/70 hover:text-white hover:bg-white/10 text-sm font-medium px-3 py-1.5 rounded no-underline transition-colors">My Bookings</a>
      <a href="recommend.html" class="bg-white/15 text-white text-sm font-medium px-3 py-1.5 rounded no-underline">AI Suggest</a>
    </div>
    <div class="hidden md:flex items-center gap-2 ml-auto shrink-0" id="navAuth"></div>
    <button class="md:hidden ml-auto flex flex-col justify-center gap-[5px] p-1.5 rounded hover:bg-white/10" id="menuToggle" aria-label="Open menu">
      <span class="block w-[22px] h-0.5 bg-white rounded"></span>
      <span class="block w-[22px] h-0.5 bg-white rounded"></span>
      <span class="block w-[22px] h-0.5 bg-white rounded"></span>
    </button>
  </div>
  <div class="hidden md:!hidden" id="mobileMenu">
    <div class="bg-primary-dark flex flex-col gap-1 px-4 pt-2 pb-4">
      <a href="index.html" class="text-white/85 hover:bg-white/10 hover:text-white px-3 py-2.5 rounded text-sm font-medium no-underline transition-colors">Browse</a>
      <a href="bookings.html" class="text-white/85 hover:bg-white/10 hover:text-white px-3 py-2.5 rounded text-sm font-medium no-underline transition-colors">My Bookings</a>
      <a href="recommend.html" class="text-white/85 hover:bg-white/10 hover:text-white px-3 py-2.5 rounded text-sm font-medium no-underline transition-colors">✨ AI Suggest</a>
      <div class="flex flex-wrap gap-2 pt-2 px-3" id="mobileAuth"></div>
    </div>
  </div>
</nav>

<div class="max-w-[660px] mx-auto px-4 sm:px-6 py-10 flex flex-col gap-5">
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-9 flex flex-col items-center text-center gap-3.5" id="promptCard">
    <span class="text-[0.72rem] font-bold text-primary uppercase tracking-widest bg-primary-light px-3 py-1 rounded-full">Powered by AI</span>
    <div class="text-[1.3rem] font-extrabold text-gray-900 tracking-tight">Space Recommender</div>
    <p class="text-sm text-gray-500 max-w-[360px] leading-relaxed">
      Get a personalized co-working space recommendation based on your booking history.
    </p>
    <button class="bg-primary hover:bg-primary-dark text-white font-semibold px-7 py-3 rounded text-base transition-colors disabled:opacity-45 disabled:cursor-not-allowed flex items-center justify-center gap-1.5" id="recommendBtn" onclick="getRecommendation()">
      Get My Recommendation
    </button>
  </div>
  <div id="resultArea"></div>
</div>

<script>
  const API = '/api/v1';
  const BANGKOK_TIMEZONE = 'Asia/Bangkok';

  const api = (path, opts = {}) => fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      ...(localStorage.getItem('token') ? { Authorization: 'Bearer ' + localStorage.getItem('token') } : {})
    },
    ...opts
  });

  function isLoggedIn() { return !!localStorage.getItem('token'); }

  function getUserName() {
    try {
      const token = localStorage.getItem('token');
      if (!token) return null;
      const payload = JSON.parse(atob(token.split('.')[1]));
      return payload.name || payload.email || 'User';
    } catch { return 'User'; }
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  if (!isLoggedIn()) window.location.href = 'index.html';

  const menuToggle = document.getElementById('menuToggle');
  const mobileMenu = document.getElementById('mobileMenu');
  menuToggle.addEventListener('click', () => { mobileMenu.classList.toggle('hidden'); });
  document.addEventListener('click', (e) => { if (!e.target.closest('nav')) mobileMenu.classList.add('hidden'); });

  function renderNav() {
    const navAuth = document.getElementById('navAuth');
    const mobileAuth = document.getElementById('mobileAuth');
    const ghostBtn = 'text-white/75 border border-white/30 hover:bg-white/10 hover:text-white font-semibold px-3 py-1.5 rounded text-sm transition-colors cursor-pointer bg-transparent';
    navAuth.innerHTML = `
      <span class="text-sm text-white/70 font-medium">Hi, ${getUserName()}</span>
      <button class="${ghostBtn}" id="logoutBtn">Sign Out</button>
    `;
    mobileAuth.innerHTML = `
      <span class="text-white/70 text-sm self-center">Hi, ${getUserName()}</span>
      <button class="${ghostBtn}" id="mobileLogoutBtn">Sign Out</button>
    `;
    document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('token'); window.location.href = 'index.html'; });
    document.getElementById('mobileLogoutBtn').addEventListener('click', () => { localStorage.removeItem('token'); window.location.href = 'index.html'; });
  }
  renderNav();

  async function getRecommendation() {
    const btn = document.getElementById('recommendBtn');
    const resultArea = document.getElementById('resultArea');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Analyzing...';

    resultArea.innerHTML = `
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-9 flex flex-col items-center gap-3.5 text-center">
        <div class="flex gap-1.5">
          <div class="thinking-dot"></div>
          <div class="thinking-dot"></div>
          <div class="thinking-dot"></div>
        </div>
        <div class="text-sm text-gray-500 font-medium">Analyzing your booking history...</div>
      </div>
    `;

    try {
      const [recRes, histRes] = await Promise.all([
        api('/recommend', { method: 'POST' }),
        api('/reservations')
      ]);

      const recData = await recRes.json();
      if (!recRes.ok) throw new Error(recData.message || 'Recommendation failed');

      let history = [];
      if (histRes.ok) {
        const histData = await histRes.json();
        history = Array.isArray(histData.data) ? histData.data : (Array.isArray(histData) ? histData : []);
      }

      renderResult(recData.data || recData, history);
    } catch (err) {
      resultArea.innerHTML = `<div class="bg-red-50 text-red-600 border border-red-200 px-4 py-3 rounded text-sm font-medium">${err.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Get Another Recommendation';
    }
  }

  function renderResult(rec, history) {
    const resultArea = document.getElementById('resultArea');
    const spaceName = rec.recommended || rec.recommendedSpace || rec.space || rec.name || '—';
    const reason = rec.reason || rec.description || rec.explanation || '';
    const alternatives = rec.alternatives || rec.alternativeSpaces || [];

    let historyHtml = '';
    if (history && history.length > 0) {
      const recent = history.slice(0, 5);
      historyHtml = `
        <div class="flex flex-col gap-2">
          <div class="text-[0.72rem] font-bold text-gray-400 uppercase tracking-wide">Based on your recent bookings</div>
          <div class="flex flex-col gap-1.5">
            ${recent.map(r => {
              const name = r.coworkingSpace?.name || 'Unknown Space';
              const date = new Date(r.apptDate).toLocaleDateString('en-GB', {
                timeZone: BANGKOK_TIMEZONE, weekday: 'short', month: 'short', day: 'numeric'
              });
              return `
                <div class="flex items-center justify-between bg-slate-50 border border-gray-200 rounded px-3.5 py-2.5 text-sm">
                  <span class="font-semibold text-gray-900">${escHtml(name)}</span>
                  <span class="text-gray-400 text-xs">${escHtml(date)}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    let altHtml = '';
    if (alternatives.length > 0) {
      altHtml = `
        <div class="flex flex-col gap-2">
          <div class="text-[0.72rem] font-bold text-gray-400 uppercase tracking-wide">Alternative Spaces</div>
          <div class="flex flex-col gap-1.5">
            ${alternatives.map(alt => {
              const altName = typeof alt === 'string' ? alt : (alt.name || alt.space || JSON.stringify(alt));
              return `<div class="bg-slate-50 border border-gray-200 rounded px-3.5 py-2.5 text-sm text-gray-900">${escHtml(altName)}</div>`;
            }).join('')}
          </div>
        </div>
      `;
    }

    resultArea.innerHTML = `
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
        <div class="bg-primary px-5 py-3.5 flex items-center gap-2.5">
          <span class="text-[0.78rem] font-bold text-white/85 uppercase tracking-wider">Recommended for You</span>
        </div>
        <div class="p-5 sm:p-6 flex flex-col gap-4">
          <div class="text-[1.25rem] font-extrabold text-gray-900">${escHtml(spaceName)}</div>
          ${reason ? `<div class="text-sm text-gray-500 leading-relaxed bg-slate-50 rounded-lg px-4 py-3.5 border-l-[3px] border-primary">${escHtml(reason)}</div>` : ''}
          ${historyHtml}
          ${altHtml}
          <div class="pt-1">
            <a href="index.html" class="border border-primary text-primary hover:bg-primary-light font-semibold px-3 py-1.5 rounded text-sm transition-colors no-underline">Browse All Spaces</a>
          </div>
        </div>
      </div>
    `;
  }
</script>
</body>
</html>
