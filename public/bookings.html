<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings – CoWork</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#384795', dark: '#2d3a7a', light: '#eef0fa', light2: '#d4d9f0' }
          }
        }
      }
    }
  </script>
  <style>
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton { background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:6px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner { display:inline-block; width:15px; height:15px; border:2px solid rgba(255,255,255,0.3); border-top-color:currentColor; border-radius:50%; animation:spin .6s linear infinite; flex-shrink:0; }
  </style>
</head>
<body class="bg-slate-50 text-gray-900 min-h-screen">

<nav class="bg-primary sticky top-0 z-50 shadow-md">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 h-[60px] flex items-center gap-4">
    <a href="index.html" class="text-white font-bold text-lg shrink-0 no-underline hover:opacity-90">CoWork</a>
    <div class="hidden md:flex items-center gap-0.5 flex-1">
      <a href="index.html" class="text-white/70 hover:text-white hover:bg-white/10 text-sm font-medium px-3 py-1.5 rounded no-underline transition-colors">Browse</a>
      <a href="bookings.html" class="bg-white/15 text-white text-sm font-medium px-3 py-1.5 rounded no-underline">My Bookings</a>
      <a href="recommend.html" class="text-white/70 hover:text-white hover:bg-white/10 text-sm font-medium px-3 py-1.5 rounded no-underline transition-colors">AI Suggest</a>
    </div>
    <div class="hidden md:flex items-center gap-2 ml-auto shrink-0" id="navAuth"></div>
    <button class="md:hidden ml-auto flex flex-col justify-center gap-[5px] p-1.5 rounded hover:bg-white/10" id="menuToggle" aria-label="Open menu">
      <span class="block w-[22px] h-0.5 bg-white rounded"></span>
      <span class="block w-[22px] h-0.5 bg-white rounded"></span>
      <span class="block w-[22px] h-0.5 bg-white rounded"></span>
    </button>
  </div>
  <div class="hidden md:!hidden" id="mobileMenu">
    <div class="bg-primary-dark flex flex-col gap-1 px-4 pt-2 pb-4">
      <a href="index.html" class="text-white/85 hover:bg-white/10 hover:text-white px-3 py-2.5 rounded text-sm font-medium no-underline transition-colors">Browse</a>
      <a href="bookings.html" class="text-white/85 hover:bg-white/10 hover:text-white px-3 py-2.5 rounded text-sm font-medium no-underline transition-colors">My Bookings</a>
      <a href="recommend.html" class="text-white/85 hover:bg-white/10 hover:text-white px-3 py-2.5 rounded text-sm font-medium no-underline transition-colors">✨ AI Suggest</a>
      <div class="flex flex-wrap gap-2 pt-2 px-3" id="mobileAuth"></div>
    </div>
  </div>
</nav>

<main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
  <div class="mb-6">
    <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">My Bookings</h1>
    <p class="text-sm text-gray-500 mt-1">Manage your upcoming reservations</p>
  </div>
  <div id="bookingsList">
    <div class="flex flex-col gap-3.5">
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5">
        <div class="skeleton h-4 w-[45%] mb-2"></div>
        <div class="skeleton h-3 w-[70%] mb-2.5"></div>
        <div class="skeleton h-6 w-[35%] rounded-full"></div>
      </div>
      <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5">
        <div class="skeleton h-4 w-1/2 mb-2"></div>
        <div class="skeleton h-3 w-[65%] mb-2.5"></div>
        <div class="skeleton h-6 w-[40%] rounded-full"></div>
      </div>
    </div>
  </div>
</main>

<!-- DETAIL MODAL -->
<div class="fixed inset-0 bg-gray-900/50 z-[200] p-5 hidden items-center justify-center" id="detailModal">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-[480px] p-7 flex flex-col gap-4" role="dialog" aria-modal="true" aria-labelledby="detailModalTitle">
    <div class="flex items-center justify-between">
      <h2 class="text-[1.1rem] font-bold text-gray-900" id="detailModalTitle">Booking Detail</h2>
      <button class="text-gray-400 hover:bg-gray-100 p-1 rounded text-xl leading-none transition-colors" id="detailModalClose" aria-label="Close">&times;</button>
    </div>
    <div id="detailModalBody" class="flex flex-col gap-3.5"></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="fixed inset-0 bg-gray-900/50 z-[200] p-5 hidden items-center justify-center" id="editModal">
  <div class="bg-white rounded-xl shadow-2xl w-full max-w-[420px] p-7 flex flex-col gap-4" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
    <div class="flex items-center justify-between">
      <h2 class="text-[1.1rem] font-bold text-gray-900" id="editModalTitle">Edit Booking</h2>
      <button class="text-gray-400 hover:bg-gray-100 p-1 rounded text-xl leading-none transition-colors" id="editModalClose" aria-label="Close">&times;</button>
    </div>
    <div id="editAlert"></div>
    <div class="flex flex-col gap-1.5">
      <label class="text-[0.82rem] font-semibold text-gray-900" for="editApptDate">New Date</label>
      <input type="date" id="editApptDate" class="w-full px-3.5 py-2.5 border border-gray-200 rounded text-sm text-gray-900 bg-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 disabled:opacity-45 disabled:cursor-not-allowed" required />
    </div>
    <div class="flex flex-col gap-1.5">
      <label class="text-[0.82rem] font-semibold text-gray-900" for="editApptStartSlot">Start Time</label>
      <select id="editApptStartSlot" class="w-full px-3.5 py-2.5 border border-gray-200 rounded text-sm text-gray-900 bg-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 disabled:opacity-45 disabled:cursor-not-allowed" required>
        <option value="">Select start time</option>
      </select>
    </div>
    <div class="flex flex-col gap-1.5">
      <label class="text-[0.82rem] font-semibold text-gray-900" for="editApptEndSlot">End Time</label>
      <select id="editApptEndSlot" class="w-full px-3.5 py-2.5 border border-gray-200 rounded text-sm text-gray-900 bg-white focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 disabled:opacity-45 disabled:cursor-not-allowed" required>
        <option value="">Select end time</option>
      </select>
    </div>
    <button class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-2.5 rounded text-sm transition-colors disabled:opacity-45 disabled:cursor-not-allowed flex items-center justify-center gap-1.5" id="editSaveBtn">Save Changes</button>
  </div>
</div>

<script>
  const API = '/api/v1';
  const BANGKOK_TIMEZONE = 'Asia/Bangkok';

  const api = (path, opts = {}) => fetch(API + path, {
    headers: {
      'Content-Type': 'application/json',
      ...(localStorage.getItem('token') ? { Authorization: 'Bearer ' + localStorage.getItem('token') } : {})
    },
    ...opts
  });

  function isLoggedIn() { return !!localStorage.getItem('token'); }

  function getUserName() {
    try {
      const token = localStorage.getItem('token');
      if (!token) return null;
      const payload = JSON.parse(atob(token.split('.')[1]));
      return payload.name || payload.email || 'User';
    } catch { return 'User'; }
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function parseTimeToMinutes(timeStr) {
    const [hourStr, minuteStr] = String(timeStr || '').split(':');
    const hour = Number(hourStr); const minute = Number(minuteStr);
    if (!Number.isInteger(hour) || !Number.isInteger(minute)) return null;
    if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return null;
    return (hour * 60) + minute;
  }

  function toHHMM(totalMinutes) {
    return `${String(Math.floor(totalMinutes / 60)).padStart(2,'0')}:${String(totalMinutes % 60).padStart(2,'0')}`;
  }

  function buildHourlySlots(openTime, closeTime) {
    const openMinutes = parseTimeToMinutes(openTime);
    const closeMinutes = parseTimeToMinutes(closeTime);
    if (openMinutes === null || closeMinutes === null || openMinutes > closeMinutes) return [];
    const slots = [];
    for (let m = Math.ceil(openMinutes / 60) * 60; m <= Math.floor(closeMinutes / 60) * 60; m += 60) {
      slots.push(toHHMM(m));
    }
    return slots;
  }

  function getBangkokDateParts(date) {
    const parts = new Intl.DateTimeFormat('en-GB', {
      timeZone: BANGKOK_TIMEZONE, year: 'numeric', month: '2-digit', day: '2-digit'
    }).formatToParts(date);
    return {
      year: Number(parts.find(p => p.type === 'year')?.value),
      month: Number(parts.find(p => p.type === 'month')?.value),
      day: Number(parts.find(p => p.type === 'day')?.value)
    };
  }

  function getBangkokTimeParts(date) {
    const parts = new Intl.DateTimeFormat('en-GB', {
      timeZone: BANGKOK_TIMEZONE, hour: '2-digit', minute: '2-digit', hour12: false
    }).formatToParts(date);
    return {
      hour: Number(parts.find(p => p.type === 'hour')?.value),
      minute: Number(parts.find(p => p.type === 'minute')?.value)
    };
  }

  function getBangkokTodayDateValue() {
    const { year, month, day } = getBangkokDateParts(new Date());
    return `${String(year).padStart(4,'0')}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }

  function toBangkokDateValue(date) {
    const { year, month, day } = getBangkokDateParts(date);
    return `${String(year).padStart(4,'0')}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  }

  function toBangkokTimeValue(date) {
    const { hour, minute } = getBangkokTimeParts(date);
    return `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
  }

  function bangkokDateTimeToISO(dateStr, timeStr) {
    const dateMatch = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(dateStr || ''));
    const timeMatch = /^(\d{2}):(\d{2})$/.exec(String(timeStr || ''));
    if (!dateMatch || !timeMatch) return null;
    const year = Number(dateMatch[1]), month = Number(dateMatch[2]), day = Number(dateMatch[3]);
    const hour = Number(timeMatch[1]), minute = Number(timeMatch[2]);
    if (month < 1 || month > 12 || day < 1 || day > 31 || hour < 0 || hour > 23 || minute < 0 || minute > 59) return null;
    const utcMillis = Date.UTC(year, month - 1, day, hour - 7, minute, 0, 0);
    const iso = new Date(utcMillis).toISOString();
    return Number.isNaN(new Date(iso).getTime()) ? null : iso;
  }

  function populateEndSlots(endSelectId, allSlots, selectedStart) {
    const endSelect = document.getElementById(endSelectId);
    const startMinutes = parseTimeToMinutes(selectedStart);
    const endSlots = allSlots.filter(slot => parseTimeToMinutes(slot) > startMinutes);
    endSelect.innerHTML = ['<option value="">Select end time</option>',
      ...endSlots.map(slot => `<option value="${slot}">${slot}</option>`)].join('');
    endSelect.disabled = endSlots.length === 0;
    return endSlots;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleString('en-GB', {
      timeZone: BANGKOK_TIMEZONE, weekday: 'short', year: 'numeric',
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
  }

  function formatRange(startDateStr, endDateStr) {
    const startText = formatDate(startDateStr);
    if (!endDateStr) return startText;
    const endText = new Date(endDateStr).toLocaleTimeString('en-GB', {
      timeZone: BANGKOK_TIMEZONE, hour: '2-digit', minute: '2-digit'
    });
    return `${startText} – ${endText}`;
  }

  function isWithinOneHour(apptDate) {
    const oneHourBefore = new Date(new Date(apptDate).getTime() - 60 * 60 * 1000);
    return Date.now() >= oneHourBefore.getTime();
  }

  if (!isLoggedIn()) window.location.href = 'index.html';

  const menuToggle = document.getElementById('menuToggle');
  const mobileMenu = document.getElementById('mobileMenu');
  menuToggle.addEventListener('click', () => { mobileMenu.classList.toggle('hidden'); });
  document.addEventListener('click', (e) => { if (!e.target.closest('nav')) mobileMenu.classList.add('hidden'); });

  function renderNav() {
    const navAuth = document.getElementById('navAuth');
    const mobileAuth = document.getElementById('mobileAuth');
    const ghostBtn = 'text-white/75 border border-white/30 hover:bg-white/10 hover:text-white font-semibold px-3 py-1.5 rounded text-sm transition-colors cursor-pointer bg-transparent';
    navAuth.innerHTML = `
      <span class="text-sm text-white/70 font-medium">Hi, ${getUserName()}</span>
      <button class="${ghostBtn}" id="logoutBtn">Sign Out</button>
    `;
    mobileAuth.innerHTML = `
      <span class="text-white/70 text-sm self-center">Hi, ${getUserName()}</span>
      <button class="${ghostBtn}" id="mobileLogoutBtn">Sign Out</button>
    `;
    document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.removeItem('token'); window.location.href = 'index.html'; });
    document.getElementById('mobileLogoutBtn').addEventListener('click', () => { localStorage.removeItem('token'); window.location.href = 'index.html'; });
  }
  renderNav();

  const detailModal = document.getElementById('detailModal');
  document.getElementById('detailModalClose').addEventListener('click', () => { detailModal.classList.add('hidden'); detailModal.classList.remove('flex'); });
  detailModal.addEventListener('click', (e) => { if (e.target === detailModal) { detailModal.classList.add('hidden'); detailModal.classList.remove('flex'); } });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { detailModal.classList.add('hidden'); detailModal.classList.remove('flex'); } });

  function openDetailModal(b) {
    const space = b.coworkingSpace || {};
    const spaceName = space.name || b.spaceName || 'Unknown Space';
    const address = space.address || '';
    const tel = space.tel || '';
    const hours = (space.opentime && space.closetime) ? `${space.opentime} – ${space.closetime}` : '';
    const dateRange = formatRange(b.apptDate, b.apptEnd);
    const qrCode = b.qrCode || '';

    const row = (label, value) => `
      <div class="flex justify-between text-sm">
        <span class="text-gray-500 font-semibold">${label}</span>
        <span class="text-right max-w-[60%]">${value}</span>
      </div>
    `;

    document.getElementById('detailModalBody').innerHTML = `
      <div class="bg-primary rounded-lg px-4 py-4 text-white">
        <div class="text-[0.7rem] font-bold uppercase tracking-wide text-white/65 mb-1">Space</div>
        <div class="font-bold text-base">${escHtml(spaceName)}</div>
        ${address ? `<div class="text-sm text-white/70 mt-0.5">${escHtml(address)}</div>` : ''}
      </div>
      <div class="flex flex-col gap-2.5">
        ${tel ? row('Tel', escHtml(tel)) : ''}
        ${hours ? row('Hours', escHtml(hours)) : ''}
        ${row('Date &amp; Time', `<span class="text-right">${escHtml(dateRange)}</span>`)}
        <div class="flex justify-between text-sm">
          <span class="text-gray-500 font-semibold">Booking ID</span>
          <span class="font-mono text-xs text-gray-400 text-right max-w-[60%] break-all">${escHtml(b._id)}</span>
        </div>
      </div>
      ${qrCode ? `
        <div class="flex flex-col items-center gap-2 p-4 bg-slate-50 rounded-lg border border-gray-200">
          <img src="${escHtml(qrCode)}" alt="Booking QR Code" class="w-40 h-40 rounded" />
          <span class="text-[0.72rem] text-gray-400 font-bold uppercase tracking-wide">Scan at check-in</span>
        </div>
      ` : '<div class="text-sm text-gray-400 text-center">No QR code available for this booking.</div>'}
    `;
    detailModal.classList.remove('hidden');
    detailModal.classList.add('flex');
  }

  let editingId = null;
  const editModal = document.getElementById('editModal');
  document.getElementById('editModalClose').addEventListener('click', closeEditModal);
  editModal.addEventListener('click', (e) => { if (e.target === editModal) closeEditModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeEditModal(); });

  function openEditModal(id, startDate, endDate, openTime, closeTime) {
    editingId = id;
    document.getElementById('editAlert').innerHTML = '';
    const dateInput = document.getElementById('editApptDate');
    const startSelect = document.getElementById('editApptStartSlot');
    const endSelect = document.getElementById('editApptEndSlot');
    const allSlots = buildHourlySlots(openTime, closeTime);
    const startSlots = allSlots.slice(0, Math.max(0, allSlots.length - 1));
    startSelect.innerHTML = ['<option value="">Select start time</option>',
      ...startSlots.map(slot => `<option value="${slot}">${slot}</option>`)].join('');
    startSelect.disabled = startSlots.length === 0;
    endSelect.innerHTML = '<option value="">Select end time</option>';
    endSelect.disabled = true;
    if (startDate) {
      const start = new Date(startDate);
      const end = endDate ? new Date(endDate) : null;
      dateInput.value = toBangkokDateValue(start);
      const currentStartSlot = toBangkokTimeValue(start);
      startSelect.value = startSlots.includes(currentStartSlot) ? currentStartSlot : '';
      if (startSelect.value) {
        const endSlots = populateEndSlots('editApptEndSlot', allSlots, startSelect.value);
        const currentEndSlot = end ? toBangkokTimeValue(end) : '';
        endSelect.value = endSlots.includes(currentEndSlot) ? currentEndSlot : '';
      }
    } else {
      dateInput.value = '';
      startSelect.value = '';
      endSelect.value = '';
    }
    dateInput.min = getBangkokTodayDateValue();
    startSelect.onchange = () => populateEndSlots('editApptEndSlot', allSlots, startSelect.value);
    editModal.classList.remove('hidden');
    editModal.classList.add('flex');
    dateInput.focus();
  }

  function closeEditModal() {
    editModal.classList.add('hidden');
    editModal.classList.remove('flex');
    editingId = null;
  }

  document.getElementById('editSaveBtn').addEventListener('click', async () => {
    const alertEl = document.getElementById('editAlert');
    const btn = document.getElementById('editSaveBtn');
    const apptDate = document.getElementById('editApptDate').value;
    const apptStartSlot = document.getElementById('editApptStartSlot').value;
    const apptEndSlot = document.getElementById('editApptEndSlot').value;
    alertEl.innerHTML = '';
    if (!apptDate || !apptStartSlot || !apptEndSlot) {
      alertEl.innerHTML = '<div class="bg-red-50 text-red-600 border border-red-200 px-4 py-3 rounded text-sm font-medium mb-2">Please select date, start time, and end time.</div>';
      return;
    }
    const apptStartISO = bangkokDateTimeToISO(apptDate, apptStartSlot);
    const apptEndISO = bangkokDateTimeToISO(apptDate, apptEndSlot);
    if (!apptStartISO || !apptEndISO) {
      alertEl.innerHTML = '<div class="bg-red-50 text-red-600 border border-red-200 px-4 py-3 rounded text-sm font-medium mb-2">Invalid date/time selection.</div>';
      return;
    }
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving...';
    try {
      const res = await api(`/reservations/${editingId}`, {
        method: 'PUT',
        body: JSON.stringify({ apptDate: apptStartISO, apptEnd: apptEndISO })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Update failed');
      closeEditModal();
      await loadBookings();
    } catch (err) {
      alertEl.innerHTML = `<div class="bg-red-50 text-red-600 border border-red-200 px-4 py-3 rounded text-sm font-medium mb-2">${err.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  });

  async function deleteBooking(id) {
    if (!confirm('Cancel this booking?')) return;
    try {
      const res = await api(`/reservations/${id}`, { method: 'DELETE' });
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.message || 'Delete failed');
      }
      await loadBookings();
    } catch (err) {
      alert('Error: ' + err.message);
    }
  }

  function renderBookings(bookings) {
    const container = document.getElementById('bookingsList');
    if (bookings.length === 0) {
      container.innerHTML = `
        <div class="text-center py-16 text-gray-500">
          <div class="font-semibold text-gray-900 mb-1.5">No bookings yet</div>
          <div class="text-sm mb-5">Browse available spaces to make your first reservation.</div>
          <a href="index.html" class="bg-primary hover:bg-primary-dark text-white font-semibold px-4 py-2 rounded text-sm transition-colors no-underline">Browse Spaces</a>
        </div>
      `;
      return;
    }

    const btnSm = 'font-semibold px-3 py-1.5 rounded text-xs transition-colors';

    container.innerHTML = `<div class="flex flex-col gap-3.5">${
      bookings.map(b => {
        const space = b.coworkingSpace || {};
        const spaceName = space.name || b.spaceName || 'Unknown Space';
        const address = space.address || '';
        const qrCode = b.qrCode || '';
        const locked = isWithinOneHour(b.apptDate);

        return `
          <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-5 flex gap-4 items-start sm:flex-row flex-col" id="booking-${escHtml(b._id)}">
            <div class="flex-1 min-w-0">
              <div class="font-bold text-gray-900 text-[0.95rem] mb-1">${escHtml(spaceName)}</div>
              ${address ? `<div class="text-sm text-gray-400 mb-2.5">${escHtml(address)}</div>` : ''}
              <div class="inline-flex items-center bg-primary-light text-primary text-xs font-semibold px-2.5 py-1 rounded-full">${escHtml(formatRange(b.apptDate, b.apptEnd))}</div>
              <div class="flex gap-2 mt-3.5 flex-wrap">
                <button class="${btnSm} bg-primary hover:bg-primary-dark text-white" onclick="openDetailModal(bookingsData.find(x=>x._id==='${escHtml(b._id)}'))">View Detail</button>
                <button class="${btnSm} border border-primary text-primary hover:bg-primary-light ${locked ? 'opacity-40 cursor-not-allowed pointer-events-none' : ''}"
                  ${locked ? 'disabled title="Cannot edit within 1 hour of booking"' : `onclick="openEditModal('${escHtml(b._id)}','${escHtml(b.apptDate)}','${escHtml(b.apptEnd||'')}','${escHtml(space.opentime||'')}','${escHtml(space.closetime||'')}')"`}>
                  Edit
                </button>
                <button class="${btnSm} border border-red-200 text-red-600 hover:bg-red-50 ${locked ? 'opacity-40 cursor-not-allowed pointer-events-none' : ''}"
                  ${locked ? 'disabled title="Cannot cancel within 1 hour of booking"' : `onclick="deleteBooking('${escHtml(b._id)}')"`}>
                  Cancel
                </button>
              </div>
              ${locked ? '<div class="text-xs text-gray-400 mt-1.5">Modifications locked — within 1 hour of booking time.</div>' : ''}
            </div>
            ${qrCode ? `
              <div class="flex flex-col items-center gap-1.5 p-3.5 bg-slate-50 rounded-lg border border-gray-200 shrink-0 self-center sm:self-start">
                <img src="${escHtml(qrCode)}" alt="QR Code" class="w-[110px] h-[110px] rounded" />
                <span class="text-[0.72rem] text-gray-400 font-bold uppercase tracking-wide">Check-in QR</span>
              </div>
            ` : ''}
          </div>
        `;
      }).join('')
    }</div>`;
  }

  let bookingsData = [];

  async function loadBookings() {
    try {
      const res = await api('/reservations');
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Failed to load bookings');
      const all = Array.isArray(data) ? data : (data.data || []);
      bookingsData = all.filter(b => b.qrCode);
      renderBookings(bookingsData);
    } catch (err) {
      document.getElementById('bookingsList').innerHTML = `<div class="bg-red-50 text-red-600 border border-red-200 px-4 py-3 rounded text-sm font-medium">${err.message}</div>`;
    }
  }

  loadBookings();
</script>
</body>
</html>
